<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Watchlist - Search</title>

    <!-- External Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <!-- Style Links -->
    <link rel="stylesheet" href="styles.css">
    <script src="index.js" defer type="module"></script>

</head>
<body>

    <nav>
        <h1>Find your film</h1>
        <a href="./watchlist.html"><h2>My Watchlist</h2></a>
    </nav>

    <section class="search-section">
        <form class="search">
            <input class="search-field" id="search-bar" type="search" placeholder="&#128270; Search for a movie">
            <input class="search-field" id="search-btn" type="button" value="Search">
        </form>
    </section>

    <main class="media-list" id="media-list">
        <div class="explore-container">
            <i class="fa-duotone fa-solid fa-film"></i>
            <h3 class="explore-text">Start exploring</h3>
        </div>
    </main>
</body>
</html>
